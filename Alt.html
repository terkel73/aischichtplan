<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F59E0B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AiSchichtplan">
  <link rel="manifest" href="manifest.json">
  <title>AiSchichtplan</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07070D;font-family:'DM Sans','Segoe UI',sans-serif;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
    #root{min-height:100vh;min-height:100dvh}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeUp .28s ease forwards}
    select option{background:#1a1a28}
    input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;width:32px;height:32px;border-radius:6px}
    input[type=color]::-webkit-color-swatch-wrapper{padding:0}
    input[type=color]::-webkit-color-swatch{border:none;border-radius:5px}
    input[type=time]{color-scheme:dark}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useRef,useCallback,useMemo,useEffect}=React;

const BASE_SHIFTS={
  FSA:{label:"Frühschicht A",group:"A",type:"F",color:"#F59E0B",hours:8},
  SSA:{label:"Spätschicht A",group:"A",type:"S",color:"#FB923C",hours:8},
  NSA:{label:"Nachtschicht A",group:"A",type:"N",color:"#F97316",hours:8},
  FSL:{label:"Frühschicht L",group:"L",type:"F",color:"#34D399",hours:8},
  SSL:{label:"Spätschicht L",group:"L",type:"S",color:"#10B981",hours:8},
  NSL:{label:"Nachtschicht L",group:"L",type:"N",color:"#059669",hours:8},
  FSV:{label:"Frühschicht V",group:"V",type:"F",color:"#60A5FA",hours:8},
  SSV:{label:"Spätschicht V",group:"V",type:"S",color:"#3B82F6",hours:8},
  NSV:{label:"Nachtschicht V",group:"V",type:"N",color:"#2563EB",hours:8},
  TSLV:{label:"Tagschicht LV",group:"T",type:"T",color:"#A78BFA",hours:8},
  TS:{label:"Tagschicht",group:"T",type:"T",color:"#8B5CF6",hours:8},
  K:{label:"Krank",group:"-",type:"K",color:"#EF4444",hours:0},
  U:{label:"Urlaub",group:"-",type:"-",color:"#6B7280",hours:0},
  Frei:{label:"Frei",group:"-",type:"-",color:"#374151",hours:0},
};
const DEFAULT_TIMES={FSA:{s:"06:00",e:"14:00"},SSA:{s:"14:00",e:"22:00"},NSA:{s:"22:00",e:"06:00"},FSL:{s:"06:00",e:"14:00"},SSL:{s:"14:00",e:"22:00"},NSL:{s:"22:00",e:"06:00"},FSV:{s:"06:00",e:"14:00"},SSV:{s:"14:00",e:"22:00"},NSV:{s:"22:00",e:"06:00"},TSLV:{s:"07:00",e:"15:00"},TS:{s:"07:00",e:"15:00"}};
const DEFAULT_ZUL={nacht:{label:"Nachtzuschlag",enabled:true,prozent:25,von:"22:00",bis:"06:00"},spaet:{label:"Spätzuschlag",enabled:true,prozent:15,von:"14:00",bis:"22:00"},samstag:{label:"Samstag",enabled:true,prozent:25},sonntag:{label:"Sonntag",enabled:true,prozent:50},ftWo:{label:"Feiertag (Wochentag)",enabled:true,prozent:175},ftWE:{label:"Feiertag (Wochenende)",enabled:true,prozent:75}};
const BL=[{code:"NI",name:"Niedersachsen"},{code:"NW",name:"Nordrhein-Westfalen"},{code:"BY",name:"Bayern"},{code:"BW",name:"Baden-Württemberg"},{code:"BE",name:"Berlin"},{code:"BB",name:"Brandenburg"},{code:"HB",name:"Bremen"},{code:"HH",name:"Hamburg"},{code:"HE",name:"Hessen"},{code:"MV",name:"Mecklenburg-Vorpommern"},{code:"RP",name:"Rheinland-Pfalz"},{code:"SL",name:"Saarland"},{code:"SN",name:"Sachsen"},{code:"ST",name:"Sachsen-Anhalt"},{code:"SH",name:"Schleswig-Holstein"},{code:"TH",name:"Thüringen"}];
const ML=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const WD=["Mo","Di","Mi","Do","Fr","Sa","So"];
const SF={NI:{2026:[{n:"Winterferien",s:"2026-02-02",e:"2026-02-06"},{n:"Osterferien",s:"2026-03-30",e:"2026-04-09"},{n:"Sommerferien",s:"2026-07-16",e:"2026-08-26"},{n:"Herbstferien",s:"2026-10-19",e:"2026-10-30"},{n:"Weihnachtsferien",s:"2026-12-23",e:"2027-01-07"}]},NW:{2026:[{n:"Osterferien",s:"2026-03-30",e:"2026-04-11"},{n:"Sommerferien",s:"2026-06-22",e:"2026-08-04"},{n:"Herbstferien",s:"2026-10-12",e:"2026-10-24"},{n:"Weihnachtsferien",s:"2026-12-23",e:"2027-01-06"}]},BY:{2026:[{n:"Winterferien",s:"2026-02-23",e:"2026-03-07"},{n:"Osterferien",s:"2026-03-27",e:"2026-04-10"},{n:"Sommerferien",s:"2026-07-30",e:"2026-09-11"},{n:"Herbstferien",s:"2026-10-30",e:"2026-11-07"},{n:"Weihnachtsferien",s:"2026-12-21",e:"2027-01-05"}]},BW:{2026:[{n:"Osterferien",s:"2026-03-27",e:"2026-04-11"},{n:"Sommerferien",s:"2026-07-30",e:"2026-09-11"},{n:"Herbstferien",s:"2026-10-26",e:"2026-10-30"},{n:"Weihnachtsferien",s:"2026-12-21",e:"2027-01-08"}]},SH:{2026:[{n:"Winterferien",s:"2026-02-23",e:"2026-03-06"},{n:"Osterferien",s:"2026-04-02",e:"2026-04-17"},{n:"Sommerferien",s:"2026-06-22",e:"2026-08-01"},{n:"Herbstferien",s:"2026-10-05",e:"2026-10-17"},{n:"Weihnachtsferien",s:"2026-12-18",e:"2027-01-05"}]},HH:{2026:[{n:"Frühjahrsferien",s:"2026-03-02",e:"2026-03-13"},{n:"Sommerferien",s:"2026-07-09",e:"2026-08-19"},{n:"Herbstferien",s:"2026-10-12",e:"2026-10-23"},{n:"Weihnachtsferien",s:"2026-12-21",e:"2027-01-01"}]}};

function aD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);return new Date(y,Math.floor((h+l-7*m+114)/31)-1,((h+l-7*m+114)%31)+1);}
function holidays(year,bl){const e=easter(year),h={},a=(d,n)=>{h[fmt(d)]=n;};a(new Date(year,0,1),"Neujahr");a(aD(e,-2),"Karfreitag");a(aD(e,1),"Ostermontag");a(new Date(year,4,1),"Tag der Arbeit");a(aD(e,39),"Christi Himmelfahrt");a(aD(e,50),"Pfingstmontag");a(new Date(year,9,3),"Tag d. Einheit");a(new Date(year,11,25),"1. Weihnachtstag");a(new Date(year,11,26),"2. Weihnachtstag");if(["BW","BY","ST"].includes(bl))a(new Date(year,0,6),"Hl. Drei Könige");if(["BW","BY","HE","NW","RP","SL"].includes(bl))a(aD(e,60),"Fronleichnam");if(["BY","SL"].includes(bl))a(new Date(year,7,15),"Maria Himmelfahrt");if(["BB","HB","HH","MV","NI","SN","ST","SH","TH"].includes(bl))a(new Date(year,9,31),"Reformationstag");if(["BW","BY","NW","RP","SL"].includes(bl))a(new Date(year,10,1),"Allerheiligen");return h;}
function ferienMap(year,bl){const r={},data=SF[bl];if(!data)return r;[year-1,year,year+1].forEach(y=>{(data[y]||[]).forEach(p=>{let d=new Date(p.s),end=new Date(p.e);while(d<=end){r[fmt(d)]=p.n;d=aD(d,1);}});});return r;}
function calcPct(code,date,allS,zul,czul,ft){const sh=allS[code];if(!sh||sh.hours===0)return 0;const dk=fmt(date),wd=date.getDay(),isSat=wd===6,isSun=wd===0,isWE=isSat||isSun,isFT=!!ft[dk];let p=0;if(isFT){p=isWE?(zul.ftWE?.prozent||0):(zul.ftWo?.prozent||0);}else if(isSun&&zul.sonntag?.enabled)p=zul.sonntag.prozent||0;else if(isSat&&zul.samstag?.enabled)p=zul.samstag.prozent||0;else{if(sh.type==="N"&&zul.nacht?.enabled)p=zul.nacht.prozent||0;else if(sh.type==="S"&&zul.spaet?.enabled)p=zul.spaet.prozent||0;}(czul||[]).forEach(cz=>{if(!cz.enabled)return;const wn=["So","Mo","Di","Mi","Do","Fr","Sa"][wd];if(!cz.tage||cz.tage.length===0||cz.tage.includes(wn))p=Math.max(p,cz.prozent||0);});return p;}
function sv(k,v){try{localStorage.setItem("as2_"+k,JSON.stringify(v));}catch(e){}}
function ld(k,d){try{const v=localStorage.getItem("as2_"+k);return v?JSON.parse(v):d;}catch(e){return d;}}

function App(){
  const [tab,setTab]=useState("scan");
  const [stab,setStab]=useState("lohn");
  const [shifts,setShifts]=useState(()=>ld("shifts",null));
  const [month,setMonth]=useState(()=>ld("month",new Date().getMonth()));
  const [year,setYear]=useState(()=>ld("year",new Date().getFullYear()));
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState("");
  const [error,setError]=useState(null);
  const [priv,setPriv]=useState(false);
  const [myName,setMyName]=useState(()=>ld("name",""));
  const [editDay,setEditDay]=useState(null);
  const [apiKey,setApiKey]=useState(()=>ld("apikey",""));
  const [showApiSetup,setShowApiSetup]=useState(false);
  const [tempKey,setTempKey]=useState("");
  const [customShifts,setCS]=useState(()=>ld("cs",{}));
  const [newSF,setNewSF]=useState({code:"",label:"",color:"#FF6B6B",type:"F"});
  const [newCZ,setNewCZ]=useState({name:"",prozent:"",tage:[],enabled:true});
  const [cfg,setCfg]=useState(()=>ld("cfg",{stundenlohn:"",pausenzeit:30,bundesland:"NI"}));
  const [times,setTimes]=useState(()=>ld("times",DEFAULT_TIMES));
  const [zul,setZul]=useState(()=>ld("zul",DEFAULT_ZUL));
  const [czul,setCzul]=useState(()=>ld("czul",[]));
  const fileRef=useRef();

  useEffect(()=>sv("shifts",shifts),[shifts]);
  useEffect(()=>sv("month",month),[month]);
  useEffect(()=>sv("year",year),[year]);
  useEffect(()=>sv("name",myName),[myName]);
  useEffect(()=>sv("cfg",cfg),[cfg]);
  useEffect(()=>sv("times",times),[times]);
  useEffect(()=>sv("zul",zul),[zul]);
  useEffect(()=>sv("czul",czul),[czul]);
  useEffect(()=>sv("cs",customShifts),[customShifts]);
  useEffect(()=>sv("apikey",apiKey),[apiKey]);

  const allS=useMemo(()=>({...BASE_SHIFTS,...customShifts}),[customShifts]);
  const ft=useMemo(()=>holidays(year,cfg.bundesland),[year,cfg.bundesland]);
  const fm=useMemo(()=>ferienMap(year,cfg.bundesland),[year,cfg.bundesland]);
  const dim=(m,y)=>new Date(y,m+1,0).getDate();
  const fw=(m,y)=>{const d=new Date(y,m,1).getDay();return d===0?6:d-1;};
  const sl=parseFloat(cfg.stundenlohn)||0;
  const ns=8-(cfg.pausenzeit||0)/60;

  const counts=useMemo(()=>!shifts?{}:Object.values(shifts).reduce((a,s)=>{if(s&&s!=="n"&&s!=="Frei")a[s]=(a[s]||0)+1;return a;},{}),[shifts]);
  const wDays=useMemo(()=>Object.entries(counts).filter(([k])=>(allS[k]?.hours||0)>0).reduce((s,[,v])=>s+v,0),[counts,allS]);
  const nNight=useMemo(()=>Object.entries(counts).filter(([k])=>allS[k]?.type==="N").reduce((s,[,v])=>s+v,0),[counts,allS]);
  const nLate=useMemo(()=>Object.entries(counts).filter(([k])=>allS[k]?.type==="S").reduce((s,[,v])=>s+v,0),[counts,allS]);

  const lohn=useMemo(()=>{
    if(!shifts||!sl)return null;
    let gl=0,zs=0,det=[];
    Object.entries(shifts).forEach(([ds,code])=>{
      const sh=allS[code];if(!sh||sh.hours===0)return;
      const bp=sl*ns,pct=calcPct(code,new Date(year,month,parseInt(ds)),allS,zul,czul,ft),zu=bp*(pct/100);
      gl+=bp;zs+=zu;if(pct>0)det.push({day:parseInt(ds),code,pct,zu});
    });
    return{gl,zs,tot:gl+zs,det};
  },[shifts,sl,ns,allS,zul,czul,ft,year,month]);

  const analyze=useCallback(async(b64)=>{
    if(!myName.trim()){setError("Bitte zuerst Namen eintragen!");return;}
    if(!apiKey){setShowApiSetup(true);return;}
    setLoading(true);setLoadMsg("KI analysiert Dienstplan…");setError(null);
    try{
      const sys=`Du analysierst Dienstpläne.\nGültige Kürzel: FSA,SSA,NSA,FSL,SSL,NSL,FSV,SSV,NSV,TSLV,TS,K,U,Frei\nExtrahiere NUR die Zeile für "${myName}". Antworte NUR mit JSON:\n{"name":"...","month":1,"year":2026,"shifts":{"1":"FSA","2":"K"}}\nK=Krank! Kürzel GROSS. Leere Felder weglassen.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,system:sys,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
            {type:"text",text:"Schichten für "+myName+" extrahieren."}
          ]}]})
      });
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API Fehler "+res.status);}
      const d=await res.json();
      const txt=d.content?.map(b=>b.text||"").join("")||"";
      const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setShifts(p.shifts||{});if(p.month)setMonth(p.month-1);if(p.year)setYear(p.year);
      setTab("kalender");
    }catch(e){
      if(e.message.includes("401")||e.message.includes("invalid")){setError("API-Key ungültig. Bitte in Einstellungen prüfen.");setShowApiSetup(true);}
      else setError("Fehler: "+e.message);
    }
    finally{setLoading(false);}
  },[myName,apiKey]);

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!myName.trim()){setError("Bitte zuerst Namen eintragen!");return;}
    const r=new FileReader();r.onload=ev=>analyze(ev.target.result.split(",")[1]);r.readAsDataURL(file);
    e.target.value="";
  };

  const days=dim(month,year),fd=fw(month,year);
  const setZ=(k,f,v)=>setZul(z=>({...z,[k]:{...z[k],[f]:v}}));
  const setT=(code,f,v)=>setTimes(t=>({...t,[code]:{...t[code],[f]:v}}));
  const togWd=w=>setNewCZ(c=>({...c,tage:c.tage.includes(w)?c.tage.filter(x=>x!==w):[...c.tage,w]}));

  const IS={background:"#0A0A12",border:"1px solid #2a2a3a",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:13,outline:"none",width:"100%",fontFamily:"'DM Mono',monospace"};
  const LS={fontSize:10,color:"#555",marginBottom:4,display:"block"};
  const C=(s,p,...ch)=>React.createElement(s,p,...ch);
  const B=(txt,fn,st)=>C("button",{onClick:fn,style:{cursor:"pointer",...st}},txt);

  // API Setup Modal
  const ApiModal=()=>C("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    C("div",{style:{background:"#111118",border:"1px solid #2a2a3a",borderRadius:20,padding:24,width:"100%",maxWidth:360}},
      C("div",{style:{fontSize:32,textAlign:"center",marginBottom:12}},"🔑"),
      C("div",{style:{color:"#fff",fontWeight:900,fontSize:18,textAlign:"center",marginBottom:6}},"API-Key einrichten"),
      C("div",{style:{color:"#555",fontSize:12,textAlign:"center",marginBottom:20,lineHeight:1.6}},"Einmalig eintragen — wird sicher auf deinem Gerät gespeichert. Niemand anderes kann ihn sehen."),
      C("div",{style:{background:"#0A0A12",border:"1px solid #1e1e30",borderRadius:12,padding:12,marginBottom:16}},
        C("div",{style:{fontSize:10,color:"#F59E0B",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:8}},"So bekommst du deinen Key:"),
        C("div",{style:{fontSize:12,color:"#666",lineHeight:1.8}},
          "1. Gehe auf ",C("span",{style:{color:"#60A5FA"}},"console.anthropic.com"),C("br"),
          "2. Anmelden / Registrieren",C("br"),
          "3. Links auf „API Keys" klicken",C("br"),
          "4. „Create Key" → kopieren"
        )
      ),
      C("label",{style:LS},"Dein API-Key (beginnt mit sk-ant-...)"),
      C("input",{
        type:"password",
        value:tempKey,
        onChange:e=>setTempKey(e.target.value),
        placeholder:"sk-ant-api03-...",
        style:{...IS,marginBottom:12,fontSize:12}
      }),
      C("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        B("Abbrechen",()=>{setShowApiSetup(false);setTempKey("");},{background:"#1a1a22",border:"1px solid #2a2a3a",borderRadius:10,padding:"11px 0",color:"#666",fontWeight:700,fontSize:13,width:"100%"}),
        B("Speichern",()=>{if(!tempKey.trim())return;setApiKey(tempKey.trim());setShowApiSetup(false);setTempKey("");},{background:tempKey.trim()?"linear-gradient(135deg,#10B981,#059669)":"#1a1a22",border:"none",borderRadius:10,padding:"11px 0",color:tempKey.trim()?"#fff":"#444",fontWeight:700,fontSize:13,width:"100%"})
      )
    )
  );

  return C("div",{style:{fontFamily:"'DM Sans',sans-serif",background:"#07070D",minHeight:"100vh",display:"flex",justifyContent:"center",padding:"0 0 60px"}},

    showApiSetup&&C(ApiModal,null),

    C("div",{style:{width:"100%",maxWidth:420,padding:"0 16px"}},

      // Header
      C("div",{style:{padding:"20px 0 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        C("div",null,
          C("div",{style:{fontSize:9,letterSpacing:3,color:"#444",fontFamily:"monospace",textTransform:"uppercase"}},"Schichtplan Manager"),
          C("div",{style:{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:"-1px"}},"Ai",C("span",{style:{color:"#F59E0B"}},"Schichtplan"))
        ),
        C("div",{onClick:()=>setPriv(p=>!p),style:{background:priv?"#172B1F":"#111118",border:"1px solid "+(priv?"#10B981":"#1c1c28"),borderRadius:20,padding:"7px 13px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}},
          C("span",{style:{fontSize:14}},priv?"🔒":"👁"),
          C("span",{style:{fontSize:11,color:priv?"#10B981":"#555",fontWeight:700}},priv?"PRIVAT":"NORMAL")
        )
      ),

      // Name
      C("div",{style:{background:"#111118",border:"1px solid #1c1c28",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}},
        C("span",null,"👤"),
        C("input",{value:myName,onChange:e=>setMyName(e.target.value),placeholder:"Dein Name im Dienstplan…",style:{background:"transparent",border:"none",outline:"none",color:"#F59E0B",fontWeight:700,fontSize:13,fontFamily:"monospace",flex:1,minWidth:0}})
      ),

      // API Key Hinweis wenn nicht gesetzt
      !apiKey&&C("div",{onClick:()=>setShowApiSetup(true),style:{background:"#1A1500",border:"1px solid #F59E0B44",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}},
        C("span",{style:{fontSize:18}},"🔑"),
        C("div",{style:{flex:1}},
          C("div",{style:{color:"#F59E0B",fontWeight:700,fontSize:13}},"API-Key fehlt noch"),
          C("div",{style:{color:"#7a5a20",fontSize:11}},"Tippen zum Einrichten — einmalig nötig")
        ),
        C("span",{style:{color:"#F59E0B",fontSize:18}},"›")
      ),

      // Tabs
      C("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3,marginBottom:16}},
        ...[{k:"scan",i:"📷",l:"Scan"},{k:"kalender",i:"📅",l:"Kalender"},{k:"stats",i:"📊",l:"Statistik"},{k:"einstellungen",i:"⚙️",l:"Settings"}].map(t=>
          C("button",{key:t.k,onClick:()=>setTab(t.k),style:{background:tab===t.k?"#1A1A28":"transparent",border:"1px solid "+(tab===t.k?"#2a2a40":"#111"),borderRadius:10,padding:"7px 2px",color:tab===t.k?"#fff":"#444",fontSize:11,fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}},
            C("span",{style:{fontSize:16}},t.i),t.l
          )
        )
      ),

          C("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
            C("div",null,C("div",{style:{color:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:2}},"Schicht bearbeiten"),C("div",{style:{color:"#fff",fontWeight:900,fontSize:20}},editDay+". "+ML[month]+" "+year)),

          C("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}},
